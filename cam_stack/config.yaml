name: "Camera Stack (DFR1154)"
version: "0.1.0"
slug: cam_stack
description: "nginx viewer + Python audio-proxy + go2rtc voor de DFR1154 ESP32-S3 camera"
url: "https://github.com/lexhoefsloot/ha-cam-stack"
arch:
  - aarch64
  - amd64
init: false
host_network: false
ports:
  "8080/tcp": 8080
  "1984/tcp": 1984
  "8554/tcp": 8554
  "8555/tcp": 8555
ports_description:
  "8080/tcp": "Viewer page + audio AAC + levels JSON"
  "1984/tcp": "go2rtc API + WebRTC signalling"
  "8554/tcp": "RTSP server"
  "8555/tcp": "WebRTC fallback over TCP"
options:
  cam_ip: "192.168.2.104"
  cam_audio_port: 82
  cam_stream_port: 81
  cam_control_port: 80
  audio_gain_db: 12
  watchdog_stall_s: 15
  watchdog_startup_grace_s: 30
  log_level: "info"
schema:
  cam_ip: "match(^[0-9.]+$)"
  cam_audio_port: "port"
  cam_stream_port: "port"
  cam_control_port: "port"
  audio_gain_db: "int(0,40)"
  watchdog_stall_s: "int(5,300)"
  watchdog_startup_grace_s: "int(5,300)"
  log_level: "list(trace|debug|info|warn|error)"
map:
  - "share:rw"
