<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DFR1154 Cam</title>
  <style>
    body { background:#111; color:#eee; font-family:-apple-system,sans-serif;
           text-align:center; margin:0; padding:1rem; }
    img, audio { max-width:100%; border-radius:8px; }
    .row { display:flex; justify-content:center; gap:.5rem;
           margin:.75rem 0; flex-wrap:wrap; }
    button { background:#222; color:#eee; border:1px solid #555;
             padding:.5rem 1rem; border-radius:6px; font-size:1rem;
             cursor:pointer; }
    button:hover { background:#333; }
    .stat { font-size:.95rem; color:#aaa; }
    .stat b { color:#eee; }
  </style>
</head>
<body>
  <h2>DFR1154 ESP32-S3 Camera</h2>

  <!-- MJPEG video, multicast via go2rtc -->
  <img id="video" src="/api/stream.mjpeg?src=dfr1154" alt="video">

  <!-- Audio: dedicated Python proxy → ffmpeg → AAC. Avoids go2rtc's
       slow-startup audio pipeline. iOS Safari plays raw AAC ADTS. -->
  <div class="row">
    <audio id="audio" controls preload="none" crossorigin="anonymous"
           src="/api/audio.aac"></audio>
  </div>

  <!-- Audio level: instantaneous bar + 5-min rolling history.
       Web Audio API analyses the <audio> element while it plays. -->
  <canvas id="levels" style="width:100%;height:100px;background:#1a1a1a;border-radius:6px;"></canvas>
  <p class="stat">Level <b id="lvl">—</b>  &middot;  samples <b id="cnt">0</b>  <span style="color:#666">(last 5 min)</span></p>

  <!-- IR controls, proxied to the camera through nginx -->
  <div class="row">
    <button onclick="ir('on')">IR on</button>
    <button onclick="ir('off')">IR off</button>
    <button onclick="ir('auto')">IR auto</button>
  </div>

  <p class="stat">Lux <b id="lux">?</b> &middot; IR <b id="ir">?</b>
     &middot; auto <b id="auto">?</b></p>

  <script>
    function ir(s) {
      fetch('/cam/ir?state=' + s)
        .then(function(r){ return r.json(); })
        .then(update);
    }
    function update(d) {
      document.getElementById('lux').textContent  = d.lux.toFixed(1);
      document.getElementById('ir').textContent   = d.ir   ? 'on' : 'off';
      document.getElementById('auto').textContent = d.auto ? 'on' : 'off';
    }
    function poll() {
      fetch('/cam/light')
        .then(function(r){ return r.json(); })
        .then(update)
        .catch(function(){});
    }
    poll();
    setInterval(poll, 3000);

    // -------- Audio level graph (server-computed, last 5 minutes) --------
    var canvas  = document.getElementById('levels');
    var lvlText = document.getElementById('lvl');
    var cntText = document.getElementById('cnt');
    var ctx2d   = canvas.getContext('2d');
    var graphState = { samples: [], rate: 5, max: 1500 };

    async function fetchLevels() {
      try {
        var r = await fetch('/api/levels.json');
        var j = await r.json();
        graphState = j;
        var pk = j.samples.length ? j.samples[j.samples.length - 1] : 0;
        var rm = (j.rms && j.rms.length) ? j.rms[j.rms.length - 1] : 0;
        lvlText.textContent =
          'peak ' + (pk * 100).toFixed(0) + '%  rms ' + (rm * 100).toFixed(0) + '%';
        cntText.textContent = j.samples.length;
        drawGraph();
      } catch (e) {
        lvlText.textContent = 'levels: ' + e.message;
      }
    }

    function drawGraph() {
      var w = canvas.width  = canvas.offsetWidth;
      var h = canvas.height = canvas.offsetHeight;
      ctx2d.clearRect(0, 0, w, h);

      // 1-minute grid lines (5 columns across the 5-minute window)
      ctx2d.strokeStyle = '#333';
      for (var i = 1; i < 5; i++) {
        var gx = (i / 5) * w;
        ctx2d.beginPath();
        ctx2d.moveTo(gx, 0); ctx2d.lineTo(gx, h);
        ctx2d.stroke();
      }

      var samples = graphState.samples || [];
      var max = graphState.max || 1500;
      var barW = w / max;
      var start = max - samples.length;
      for (var j = 0; j < samples.length; j++) {
        var lvl = samples[j];
        // Map [0..1] directly to bar height; ambient room is ~15%, peaks
        // hit ~80–100% so the full range is naturally usable.
        var bh = lvl * h;
        ctx2d.fillStyle = lvl > 0.6 ? '#e08054' : lvl > 0.3 ? '#c8a04a' : '#4ab078';
        ctx2d.fillRect((start + j) * barW, h - bh, Math.max(1, barW), bh);
      }
    }

    fetchLevels();
    setInterval(fetchLevels, 1000);
    window.addEventListener('resize', drawGraph);
  </script>
</body>
</html>
